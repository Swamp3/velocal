<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <defs>
        <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#020617" />
            <stop offset="100%" stop-color="#0f172a" />
        </linearGradient>
    </defs>
    <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)" />

    <!-- Wheel outer ring -->
    <circle cx="256" cy="256" r="180" fill="none" stroke="#38bdf8" stroke-width="18" />

    <!-- Wheel inner ring -->
    <circle cx="256" cy="256" r="40" fill="#020617" stroke="#38bdf8" stroke-width="10" />

    <!-- Spokes -->
    <g stroke="#38bdf8" stroke-width="8">
        <line x1="256" y1="86" x2="256" y2="216" />
        <line x1="256" y1="296" x2="256" y2="426" />
        <line x1="86" y1="256" x2="216" y2="256" />
        <line x1="296" y1="256" x2="426" y2="256" />

        <line x1="141" y1="141" x2="216" y2="216" />
        <line x1="296" y1="296" x2="371" y2="371" />
        <line x1="371" y1="141" x2="296" y2="216" />
        <line x1="141" y1="371" x2="216" y2="296" />
    </g>

    <!-- Calendar tile -->
    <g transform="translate(176,176)">
        <!-- Calendar base -->
        <rect x="0" y="32" width="160" height="120" rx="16" ry="16" fill="#0b1120" stroke="#e5f3ff"
            stroke-width="6" />
        <!-- Header bar -->
        <rect x="0" y="0" width="160" height="40" rx="16" ry="16" fill="#38bdf8" />
        <!-- Rings (binding) -->
        <circle cx="40" cy="20" r="6" fill="#e5f3ff" />
        <circle cx="80" cy="20" r="6" fill="#e5f3ff" />
        <circle cx="120" cy="20" r="6" fill="#e5f3ff" />

        <!-- Calendar grid dots -->
        <g fill="#38bdf8">
            <!-- Row 1 -->
            <circle cx="32" cy="64" r="5" />
            <circle cx="64" cy="64" r="5" />
            <circle cx="96" cy="64" r="5" />
            <circle cx="128" cy="64" r="5" />
            <!-- Row 2 -->
            <circle cx="32" cy="92" r="5" />
            <circle cx="64" cy="92" r="5" />
            <circle cx="96" cy="92" r="5" />
            <circle cx="128" cy="92" r="5" />
            <!-- Row 3 -->
            <circle cx="32" cy="120" r="5" />
            <circle cx="64" cy="120" r="5" />
            <circle cx="96" cy="120" r="5" />
            <circle cx="128" cy="120" r="5" />
        </g>

        <!-- Highlighted event date -->
        <rect x="64" y="88" width="32" height="32" rx="8" ry="8" fill="#38bdf8" />
        <text x="80" y="110" text-anchor="middle" dominant-baseline="central"
            font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="18" font-weight="700" fill="#0b1120">
            12
        </text>
    </g>

    <!-- Subtle glow -->
    <ellipse cx="256" cy="420" rx="140" ry="24" fill="#020617" opacity="0.4" />
</svg>
  
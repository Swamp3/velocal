services:
  postgres:
    container_name: velocal-postgres
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    environment:
      POSTGRES_USER: velocal
      POSTGRES_PASSWORD: ${DB_PASSWORD:-velocal}
      POSTGRES_DB: velocal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velocal"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    container_name: velocal-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: velocal
      DB_PASSWORD: ${DB_PASSWORD:-velocal}
      DB_NAME: velocal
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@velocal.cc}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      IMPORT_COOLDOWN_MINUTES: ${IMPORT_COOLDOWN_MINUTES:-5}
      SITE_URL: ${SITE_URL:-https://velocal.cc}
    networks:
      - default
      - caddy
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    container_name: velocal-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    environment:
      NODE_ENV: production
      PORT: 80
      # Backend always listens on :3000 inside its container; this is an
      # in-network hop, not a host-port mapping, so don't pull from `BACKEND_PORT`.
      BACKEND_INTERNAL_URL: http://backend:3000
      SITE_URL: ${SITE_URL:-https://velocal.cc}
      NG_ALLOWED_HOSTS: ${NG_ALLOWED_HOSTS:-velocal.cc,www.velocal.cc,localhost}
    networks:
      - default
      - caddy
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  pgdata:
  uploads:

networks:
  caddy:
    external: true

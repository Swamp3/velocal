server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # API proxy — resolve at request time so nginx starts even if backend isn't up yet
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Import endpoint needs a longer timeout (scraping can take minutes)
    location /api/import/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Hashed static assets - long cache
    location ~* "\.[0-9a-f]{16,}\.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|webp|avif)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Translation files - short cache for quick i18n updates
    location /assets/i18n/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Other static assets
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

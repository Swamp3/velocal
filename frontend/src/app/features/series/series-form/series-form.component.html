<div class="mx-auto max-w-xl">
  <a
    routerLink="/series"
    class="inline-flex items-center gap-1.5 text-sm font-medium text-[var(--color-text-muted)]
      hover:text-[var(--color-text)] transition-colors"
  >
    <span class="material-symbols-outlined text-[16px]">arrow_back</span>
    {{ 'series.backToList' | transloco }}
  </a>

  <h1 class="mt-5 text-2xl font-bold text-[var(--color-text)]">
    {{ (isEdit() ? 'series.editTitle' : 'series.create') | transloco }}
  </h1>

  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="mt-6 space-y-5 rounded-2xl border border-[var(--color-border)]
      bg-[var(--color-bg-card)] p-6 shadow-[var(--shadow-card)]"
  >
    <ui-input
      [label]="'series.name' | transloco"
      formControlName="name"
      [error]="fieldError('name')"
    />

    <div>
      <label class="mb-1.5 block text-sm font-medium text-[var(--color-text)]">
        {{ 'series.description' | transloco }}
      </label>
      <textarea
        formControlName="description"
        rows="3"
        class="w-full rounded-lg border border-[var(--color-border)] bg-[var(--color-bg)]
          px-3 py-2 text-sm text-[var(--color-text)]
          focus:border-[var(--color-primary)] focus:outline-none focus:ring-1
          focus:ring-[var(--color-primary)]"
      ></textarea>
    </div>

    <div class="grid gap-4 sm:grid-cols-2">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-[var(--color-text)]">
          {{ 'series.year' | transloco }}
        </label>
        <input
          type="number"
          formControlName="year"
          class="w-full rounded-lg border border-[var(--color-border)] bg-[var(--color-bg)]
            px-3 py-2 text-sm text-[var(--color-text)]
            focus:border-[var(--color-primary)] focus:outline-none focus:ring-1
            focus:ring-[var(--color-primary)]"
        />
      </div>

      <div>
        <label class="mb-1.5 block text-sm font-medium text-[var(--color-text)]">
          {{ 'series.discipline' | transloco }}
        </label>
        <select
          formControlName="disciplineSlug"
          class="w-full rounded-lg border border-[var(--color-border)] bg-[var(--color-bg)]
            px-3 py-2 text-sm text-[var(--color-text)]
            focus:border-[var(--color-primary)] focus:outline-none focus:ring-1
            focus:ring-[var(--color-primary)]"
        >
          <option value="">{{ 'events.allDisciplines' | transloco }}</option>
          @for (d of disciplines(); track d.slug) {
            <option [value]="d.slug">{{ d.nameTranslations['de'] || d.slug }}</option>
          }
        </select>
      </div>
    </div>

    @if (isEdit()) {
      <div>
        <label class="mb-1.5 block text-sm font-medium text-[var(--color-text)]">
          {{ 'series.image' | transloco }}
        </label>
        <app-image-upload
          [imageUrl]="imageUrl()"
          [uploadFn]="uploadImageFn"
          [deleteFn]="deleteImageFn"
          [disabled]="loading()"
          (imageChange)="imageUrl.set($event)"
        />
      </div>
    }

    <ui-input
      [label]="'series.externalUrlLabel' | transloco"
      type="url"
      formControlName="externalUrl"
    />

    <div class="flex gap-3 pt-2">
      <ui-button
        type="submit"
        [loading]="loading()"
        [disabled]="loading()"
      >
        {{ 'common.save' | transloco }}
      </ui-button>
      <a routerLink="/series">
        <ui-button variant="outline" type="button">
          {{ 'common.cancel' | transloco }}
        </ui-button>
      </a>
    </div>
  </form>
</div>

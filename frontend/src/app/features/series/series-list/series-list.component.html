<div class="space-y-6">
  <!-- Header -->
  <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-2xl font-bold text-[var(--color-text)] sm:text-3xl">
        {{ 'series.title' | transloco }}
      </h1>
    </div>

    @if (auth.isAuthenticated()) {
      <a
        routerLink="/series/new"
        class="inline-flex items-center gap-1.5 rounded-lg bg-[var(--color-primary)]
          px-4 py-2 text-sm font-medium text-white shadow-sm
          hover:bg-[var(--color-primary-hover)] transition-colors"
      >
        <span class="material-symbols-outlined text-[18px]">add</span>
        {{ 'series.create' | transloco }}
      </a>
    }
  </div>

  <!-- Filters -->
  <div
    class="flex flex-col gap-4 rounded-2xl border border-[var(--color-border)]
      bg-[var(--color-bg-card)] p-4 shadow-[var(--shadow-card)] sm:flex-row sm:items-center"
  >
    <div class="relative flex-1">
      <span
        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2
          text-[20px] text-[var(--color-text-muted)]"
      >search</span>
      <input
        type="text"
        [value]="searchQuery()"
        (input)="onSearchInput($event)"
        [placeholder]="'series.search' | transloco"
        class="w-full rounded-lg border border-[var(--color-border)] bg-[var(--color-bg)]
          py-2 pl-10 pr-3 text-sm text-[var(--color-text)]
          placeholder:text-[var(--color-text-muted)]
          focus:border-[var(--color-primary)] focus:outline-none focus:ring-1
          focus:ring-[var(--color-primary)]"
      />
    </div>

    <select
      [value]="selectedYear() ?? ''"
      (change)="onYearChange($event)"
      class="rounded-lg border border-[var(--color-border)] bg-[var(--color-bg)]
        px-3 py-2 text-sm text-[var(--color-text)]
        focus:border-[var(--color-primary)] focus:outline-none focus:ring-1
        focus:ring-[var(--color-primary)]"
    >
      <option value="">{{ 'series.allYears' | transloco }}</option>
      @for (year of years(); track year) {
        <option [value]="year">{{ year }}</option>
      }
    </select>

    <app-discipline-filter
      [disciplines]="disciplines()"
      [selected]="selectedDiscipline() ? [selectedDiscipline()] : []"
      (selectedChange)="onDisciplineChange($event)"
    />
  </div>

  <!-- Results -->
  @if (loading()) {
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (_ of [1, 2, 3, 4, 5, 6]; track $index) {
        <div class="rounded-2xl border border-[var(--color-border)] bg-[var(--color-bg-card)] p-5">
          <ui-skeleton height="1.25rem" width="70%" />
          <div class="mt-3 space-y-2">
            <ui-skeleton height="1rem" width="40%" />
            <ui-skeleton height="1rem" width="30%" />
          </div>
        </div>
      }
    </div>
  } @else if (seriesList().length === 0) {
    <app-empty-state
      icon="emoji_events"
      [title]="'series.noResults' | transloco"
      [message]="'series.noResultsHint' | transloco"
    />
  } @else {
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (s of seriesList(); track s.id) {
        <app-series-card [series]="s" />
      }
    </div>

    @if (totalPages() > 1) {
      <ui-pagination
        [total]="total()"
        [page]="page()"
        [limit]="limit()"
        (pageChange)="onPageChange($event)"
      />
    }
  }
</div>

<div class="flex min-h-[60vh] items-center justify-center">
  <div
    class="w-full max-w-sm rounded-[var(--radius-lg)] border border-[var(--color-border)]
      bg-[var(--color-bg)] p-8 shadow-sm"
  >
    <h1 class="mb-6 text-2xl font-bold text-[var(--color-text)]">
      {{ 'auth.resetPassword' | transloco }}
    </h1>

    @if (error()) {
      <div class="mb-4 rounded-[var(--radius-default)] border border-[var(--color-danger)]/30
        bg-[var(--color-danger)]/5 p-4 text-sm text-[var(--color-danger)]">
        <p>{{ error() }}</p>
        <a
          routerLink="/auth/login"
          class="mt-2 inline-block font-medium text-[var(--color-primary)] hover:underline"
        >
          {{ 'auth.backToLogin' | transloco }}
        </a>
      </div>
    }

    @if (token() && !error()) {
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <ui-input
          [label]="'auth.newPassword' | transloco"
          type="password"
          formControlName="password"
          [error]="fieldError('password')"
        />

        <ui-input
          [label]="'auth.confirmPassword' | transloco"
          type="password"
          formControlName="confirmPassword"
          [error]="fieldError('confirmPassword')"
        />

        <ui-button
          type="submit"
          size="lg"
          [loading]="loading()"
          [disabled]="loading()"
          class="w-full"
        >
          {{ 'auth.setPassword' | transloco }}
        </ui-button>
      </form>
    }

    <p class="mt-6 text-center text-sm text-[var(--color-text-muted)]">
      <a
        routerLink="/auth/login"
        class="font-medium text-[var(--color-primary)] hover:underline"
      >
        {{ 'auth.backToLogin' | transloco }}
      </a>
    </p>
  </div>
</div>

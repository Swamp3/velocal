<div class="flex min-h-[60vh] items-center justify-center">
  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="w-full max-w-sm rounded-[var(--radius-lg)] border border-[var(--color-border)]
      bg-[var(--color-bg)] p-8 shadow-sm"
  >
    <h1 class="mb-6 text-2xl font-bold text-[var(--color-text)]">{{ 'auth.createAccount' | transloco }}</h1>

    <div class="flex flex-col gap-4">
      <ui-input
        [label]="'auth.displayName' | transloco"
        [placeholder]="'auth.optional' | transloco"
        formControlName="displayName"
      />

      <ui-input
        [label]="'auth.email' | transloco"
        type="email"
        placeholder="name@example.com"
        formControlName="email"
        [error]="fieldError('email')"
      />

      <ui-input
        [label]="'auth.password' | transloco"
        type="password"
        formControlName="password"
        [error]="fieldError('password')"
      />

      <ui-input
        [label]="'auth.confirmPassword' | transloco"
        type="password"
        formControlName="confirmPassword"
        [error]="fieldError('confirmPassword')"
      />

      <ui-button
        type="submit"
        size="lg"
        [loading]="loading()"
        [disabled]="loading()"
        class="w-full"
      >
        {{ 'auth.register' | transloco }}
      </ui-button>
    </div>

    <p class="mt-6 text-center text-sm text-[var(--color-text-muted)]">
      {{ 'auth.hasAccount' | transloco }}
      <a
        routerLink="/auth/login"
        class="font-medium text-[var(--color-primary)] hover:underline"
      >
        {{ 'auth.login' | transloco }}
      </a>
    </p>
  </form>
</div>

<a
  [routerLink]="['/events', event().id]"
  class="group block min-w-0 overflow-hidden rounded-2xl border border-[var(--color-border)]
    bg-[var(--color-bg-card)] p-5 shadow-[var(--shadow-card)]
    transition-all duration-200
    hover:shadow-[var(--shadow-elevated)] hover:border-[var(--color-primary)]/30
    hover:-translate-y-0.5
    focus-visible:outline-2 focus-visible:outline-offset-2
    focus-visible:outline-[var(--color-primary)]"
>
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0 flex-1">
      <h3
        class="truncate text-base font-semibold text-[var(--color-text)]
          group-hover:text-[var(--color-primary)] transition-colors duration-200"
      >
        {{ event().name }}
      </h3>

      <div class="mt-2 flex flex-wrap items-center gap-x-4 gap-y-1.5 text-sm text-[var(--color-text-muted)]">
        <span class="inline-flex items-center gap-1.5">
          <span class="material-symbols-outlined text-[16px]">calendar_today</span>
          {{ event().startDate | date: 'mediumDate' }}
          @if (startTime(); as t) {
            · {{ t }}
          }
        </span>

        <span class="inline-flex items-center gap-1.5">
          <span class="material-symbols-outlined text-[16px]">location_on</span>
          {{ event().locationName }}
        </span>

        @if (distance() != null) {
          <span class="inline-flex items-center gap-1.5 text-[var(--color-primary)]">
            <span class="material-symbols-outlined text-[16px]">straighten</span>
            {{ distance() }} km
          </span>
        }
      </div>
    </div>

    <app-event-status-badge [status]="event().status" />
  </div>

  <div class="mt-4">
    <app-discipline-chip [discipline]="event().discipline" />
  </div>
</a>

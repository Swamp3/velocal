<a
  [routerLink]="['/events', event().id]"
  class="block rounded-[var(--radius-lg)] border border-[var(--color-border)]
    bg-[var(--color-bg-card)] p-4 shadow-[var(--shadow-card)]
    transition-shadow hover:shadow-[var(--shadow-elevated)]
    focus-visible:outline-2 focus-visible:outline-offset-2
    focus-visible:outline-[var(--color-primary)]"
>
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0 flex-1">
      <h3 class="truncate text-base font-semibold text-[var(--color-text)]">
        {{ event().name }}
      </h3>

      <div class="mt-1.5 flex flex-wrap items-center gap-x-4 gap-y-1 text-sm text-[var(--color-text-muted)]">
        <span class="inline-flex items-center gap-1">
          <span>📅</span>
          {{ event().startDate | date: 'dd.MM.yyyy' }}
        </span>

        <span class="inline-flex items-center gap-1">
          <span>📍</span>
          {{ event().locationName }}
        </span>

        @if (distance() != null) {
          <span class="inline-flex items-center gap-1">
            <span>📏</span>
            {{ distance() }} km
          </span>
        }
      </div>
    </div>

    <app-event-status-badge [status]="event().status" />
  </div>

  <div class="mt-3 flex items-center gap-2">
    <app-discipline-chip [discipline]="event().discipline" />
  </div>
</a>

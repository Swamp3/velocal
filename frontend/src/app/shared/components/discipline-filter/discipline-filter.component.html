<div class="flex flex-wrap items-center gap-2" role="group" [attr.aria-label]="'map.discipline' | transloco">
  <ui-chip
    [selected]="noneSelected()"
    (selectedChange)="clearAll()"
  >
    {{ 'events.allDisciplines' | transloco }}
  </ui-chip>

  @for (d of disciplines(); track d.slug) {
    <ui-chip
      [icon]="d.icon"
      [selected]="isSelected(d.slug)"
      (selectedChange)="toggle(d.slug)"
    >
      {{ translatedName(d) }}
    </ui-chip>
  }
</div>

<div class="flex flex-col items-center justify-center rounded-2xl bg-[var(--color-bg-alt)]/50 py-20 text-center">
  @if (icon()) {
    <div
      class="mb-5 flex size-16 items-center justify-center rounded-2xl
        bg-[var(--color-primary)]/10"
    >
      <span class="material-symbols-outlined text-[32px] text-[var(--color-primary)]">{{ icon() }}</span>
    </div>
  }
  <p class="text-lg font-semibold text-[var(--color-text)]">{{ title() }}</p>
  @if (message()) {
    <p class="mt-2 max-w-sm text-sm text-[var(--color-text-muted)]">{{ message() }}</p>
  }
  <ng-content />
</div>

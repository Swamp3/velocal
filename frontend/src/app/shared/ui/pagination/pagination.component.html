<nav class="flex items-center gap-1" aria-label="Pagination">
  <button
    class="rounded-lg px-3 py-2 text-sm font-medium
      text-[var(--color-text-muted)] hover:bg-[var(--color-bg-alt)]
      disabled:opacity-40 disabled:pointer-events-none cursor-pointer
      transition-all duration-200"
    [disabled]="page() <= 1"
    (click)="pageChange.emit(page() - 1)"
    aria-label="Previous page"
  >
    <span class="material-symbols-outlined text-[18px]">chevron_left</span>
  </button>

  @for (p of pages(); track p) {
    <button
      [class]="
        'rounded-lg px-3.5 py-2 text-sm font-medium cursor-pointer transition-all duration-200 ' +
        (p === page()
          ? 'bg-[var(--color-primary)] text-white shadow-sm'
          : 'text-[var(--color-text-muted)] hover:bg-[var(--color-bg-alt)] hover:text-[var(--color-text)]')
      "
      [attr.aria-current]="p === page() ? 'page' : null"
      (click)="pageChange.emit(p)"
    >
      {{ p }}
    </button>
  }

  <button
    class="rounded-lg px-3 py-2 text-sm font-medium
      text-[var(--color-text-muted)] hover:bg-[var(--color-bg-alt)]
      disabled:opacity-40 disabled:pointer-events-none cursor-pointer
      transition-all duration-200"
    [disabled]="page() >= totalPages()"
    (click)="pageChange.emit(page() + 1)"
    aria-label="Next page"
  >
    <span class="material-symbols-outlined text-[18px]">chevron_right</span>
  </button>
</nav>

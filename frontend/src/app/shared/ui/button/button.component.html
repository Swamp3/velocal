<button
  [type]="type()"
  [attr.form]="form()"
  [disabled]="disabled() || loading()"
  [class]="classes()"
>
  @if (loading()) {
    <span
      class="mr-2 inline-block size-4 animate-spin rounded-full border-2
        border-current border-t-transparent"
    ></span>
  }
  <ng-content />
</button>

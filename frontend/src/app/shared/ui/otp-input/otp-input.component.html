<div class="flex justify-center gap-2">
  @for (digit of digits(); track $index) {
    <input
      #digitInput
      type="text"
      inputmode="numeric"
      pattern="[0-9]*"
      maxlength="1"
      [value]="digit"
      [disabled]="isDisabled()"
      (input)="onDigitInput($event, $index)"
      (keydown)="onKeyDown($event, $index)"
      (paste)="onPaste($event)"
      (focus)="onFocus()"
      class="h-12 w-10 rounded-[var(--radius-md)] border border-[var(--color-border)]
        bg-[var(--color-bg)] text-center text-lg font-semibold text-[var(--color-text)]
        outline-none transition-colors
        focus:border-[var(--color-primary)] focus:ring-2 focus:ring-[var(--color-primary)]/20
        disabled:opacity-50"
    />
  }
</div>
